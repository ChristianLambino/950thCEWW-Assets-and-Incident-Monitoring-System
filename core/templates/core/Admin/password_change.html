{% extends "base.html" %} 

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[calc(100vh-140px)] p-4 bg-slate-50 dark:bg-slate-900 transition-colors duration-300">
    <div class="w-full max-w-md bg-white dark:bg-slate-800 rounded-3xl border border-slate-200 dark:border-slate-700 shadow-xl overflow-hidden">
        
        <div class="px-8 pt-8 pb-6 text-center border-b border-slate-100 dark:border-slate-700">
            <div class="w-16 h-16 bg-blue-100 dark:bg-blue-900/30 rounded-2xl flex items-center justify-center text-blue-600 mx-auto mb-4">
                <i class="fas fa-shield-alt text-2xl"></i>
            </div>
            <h1 class="text-xl font-black text-slate-800 dark:text-slate-100 uppercase tracking-tight">Security Update</h1>
            <p class="text-slate-500 dark:text-slate-400 text-[10px] font-bold uppercase mt-1 tracking-wider">Modify your system access credentials</p>
        </div>

        <form method="POST" id="passwordForm" class="p-8 space-y-5">
            {% csrf_token %}
            
            <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Current Password</label>
                <div class="relative">
                    <input type="password" name="old_password" required class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl p-3 text-sm font-bold text-slate-700 dark:text-white outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                </div>
                <div id="error-old_password" class="field-error-container"></div>
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-400 uppercase ml-1">New Password</label>
                <div class="relative">
                    <input type="password" name="new_password" required class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl p-3 text-sm font-bold text-slate-700 dark:text-white outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                </div>
                <div id="error-new_password" class="field-error-container"></div>
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Confirm New Password</label>
                <div class="relative">
                    <input type="password" name="confirm_password" required class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl p-3 text-sm font-bold text-slate-700 dark:text-white outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                </div>
                <div id="error-confirm_password" class="field-error-container"></div>
            </div>

            <div class="pt-4 flex flex-col gap-3">
                <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-black text-xs uppercase tracking-widest shadow-lg shadow-blue-500/20 transition-all active:scale-95">
                    Update Password
                </button>
                <a href="{% url 'profile' %}" class="w-full text-center py-2 text-[10px] font-black text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 uppercase transition-colors">
                    Back to Profile
                </a>
            </div>
        </form>
    </div>
</div>

<script>
$(document).ready(function() {
    const $form = $('#passwordForm');
    const $btn = $('#submitBtn');

    $form.on('submit', function(e) {
        e.preventDefault(); 

        // Clear previous errors
        $('.field-error-container').empty();
        
        // UI Loading State
        const originalText = $btn.html();
        $btn.prop('disabled', true)
            .addClass('opacity-70 cursor-wait')
            .html('<i class="fas fa-fingerprint animate-pulse mr-2"></i> AUTHENTICATING...');

        $.ajax({
            url: '/api/change-password/', // 🚨 Target the new DRF endpoint
            type: 'POST',
            data: $form.serialize(),
            headers: {
                'X-Requested-With': 'XMLHttpRequest'
            },
            success: function(response) {
                // Success Visual Feedback
                $btn.removeClass('bg-blue-600').addClass('bg-emerald-600')
                    .html('<i class="fas fa-check-circle mr-2"></i> CREDENTIALS UPDATED');
                
                setTimeout(() => {
                    window.location.href = "{% url 'profile' %}";
                }, 1500);
            },
            error: function(xhr) {
                $btn.prop('disabled', false).removeClass('opacity-70 cursor-wait').html(originalText);
                
                // Parse exact API errors directly beneath the inputs
                if (xhr.status === 400 && xhr.responseJSON && xhr.responseJSON.errors) {
                    const errors = xhr.responseJSON.errors;
                    for (let field in errors) {
                        // Extract the first error string from the DRF array
                        const errorText = Array.isArray(errors[field]) ? errors[field][0] : errors[field];
                        $(`#error-${field}`).html(`<p class="text-[9px] font-bold text-red-500 uppercase mt-1"><i class="fas fa-exclamation-circle mr-1"></i> ${errorText}</p>`);
                    }
                } else {
                    alert("Security Protocol Error: Request denied by server.");
                }
            }
        });
    });
});
</script>
{% endblock %}
