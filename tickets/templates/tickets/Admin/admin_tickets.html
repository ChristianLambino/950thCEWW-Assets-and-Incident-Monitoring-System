{% extends "base.html" %}

{% block content %}
<style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    :root {
        --head-bg: rgba(255, 255, 255, 0.85);
        --head-text: #0F172A;
        --head-border: #e2e8f0;
        --row-hover: #f8fafc;
        --nav-height: 73px; 
    }

    .dark {
        --head-bg: rgba(15, 23, 42, 0.85);
        --head-text: #F8FAFC;
        --head-border: #1e293b;
        --row-hover: #1e293b;
    }

    #head {
        background-color: var(--head-bg) !important;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        color: var(--head-text) !important;
        border-color: var(--head-border) !important;
        transition: all 0.3s ease;
        top: 0; 
        position: sticky;
        z-index: 30;
    }

    .admin-table-container {
        height: auto; 
        overflow: visible;
    }
    
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    .ticket-row { transition: all 0.2s ease; cursor: pointer; }
    .ticket-row:hover { 
        background-color: var(--row-hover) !important; 
        /* transform: translateY(-1px); NOTE: Commented out to prevent Z-index stacking context conflicts with action menus */ 
    }

    .id-badge {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        letter-spacing: -0.02em;
    }

    .action-menu {
        display: none;
        position: absolute;
        right: 0;
        top: 100%;
        z-index: 9999; /* Boosted from 50 to 9999 to guarantee top visibility */
        width: 200px; 
        text-align: left; 
        animation: menuFade 0.2s ease-out;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
    }

    @keyframes menuFade {
        from { opacity: 0; transform: translateY(-10px) scale(0.95); }
        to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .action-btn-trigger {
        transition: all 0.2s ease;
    }
    .action-btn-trigger:hover {
        background-color: rgba(59, 130, 246, 0.15);
        color: #2563eb;
    }
    .dark .action-btn-trigger:hover { color: #60a5fa; }

    @media (max-width: 1024px) {
        .admin-table-container { height: auto; overflow: visible; }
        table, thead, tbody, th, td, tr { display: block; }
        thead tr { position: absolute; top: -9999px; left: -9999px; }
        
        #ticketTableBody {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1rem;
            padding: 1rem;
        }

        .ticket-row {
            background: white !important;
            border: 1px solid var(--head-border) !important;
            border-radius: 1rem;
            padding: 1.25rem;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
        }

        .dark .ticket-row { background: #0f172a !important; }
        
        .ticket-row td { 
            padding: 0 !important; 
            border: none !important;
            width: 100% !important;
            max-width: none !important;
        }
    }
</style>

<div class="min-h-[calc(100vh-73px)] bg-slate-50 dark:bg-[#0F172A] p-3 md:p-6 text-slate-900 dark:text-slate-300 font-sans transition-colors duration-300">
    
    <header id="head" class="flex flex-col gap-5 p-5 md:p-6 mb-6 rounded-2xl border shadow-sm">
        <div class="flex items-center justify-between">
            <div class="flex flex-col gap-1">
                <h1 class="text-base md:text-xl font-black tracking-tight flex items-center gap-3">
                    <div class="p-2 bg-blue-100 dark:bg-blue-900/30 rounded-lg">
                        <i class="fas fa-shield-alt text-blue-600 dark:text-blue-400"></i>
                    </div>
                    <span class="bg-clip-text text-transparent bg-gradient-to-r from-slate-900 to-slate-600 dark:from-white dark:to-slate-400 uppercase">
                        Support Command Center
                    </span>
                </h1>
                <p class="text-xs font-semibold opacity-70 text-blue-600 dark:text-blue-400 uppercase tracking-widest pl-11">
                    Administrative Dispatch Overview
                </p>
            </div>
            <div class="lg:hidden bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800/50 px-3 py-1.5 rounded-lg flex items-center gap-2">
                <i class="fas fa-ticket-alt text-blue-500 text-xs"></i>
                <span id="mobileCount" class="text-sm font-black text-blue-700 dark:text-blue-400">00</span>
            </div>
        </div>
        
        <div class="flex flex-col md:flex-row items-stretch md:items-center gap-4">
            <div class="relative flex-grow max-w-2xl">
                <span class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <i class="fas fa-search text-slate-400"></i>
                </span>
                <input type="text" id="ticketSearch" placeholder="Search by ID, Subject, Client, or Date..." 
                    class="w-full bg-slate-100/80 dark:bg-slate-800/80 border border-slate-200 dark:border-slate-700 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 rounded-xl py-2.5 pl-11 pr-4 text-sm font-medium outline-none transition-all shadow-inner">
            </div>
            
            <div class="flex overflow-x-auto no-scrollbar bg-slate-100/80 dark:bg-slate-800/80 p-1.5 rounded-xl border border-slate-200/50 dark:border-slate-700/50 gap-1.5">
                <button class="filter-btn whitespace-nowrap px-5 py-2 bg-white dark:bg-blue-600 shadow text-blue-700 dark:text-white text-xs font-bold uppercase tracking-wider rounded-lg transition-all" data-filter="all" onclick="filterTable('all', this)">All</button>
                <button class="filter-btn whitespace-nowrap px-5 py-2 text-slate-600 dark:text-slate-400 text-xs font-bold uppercase tracking-wider rounded-lg hover:bg-white/60 dark:hover:bg-slate-700 transition-all" data-filter="pending" onclick="filterTable('Pending', this)">Pending</button>
                <button class="filter-btn whitespace-nowrap px-5 py-2 text-slate-600 dark:text-slate-400 text-xs font-bold uppercase tracking-wider rounded-lg hover:bg-white/60 dark:hover:bg-slate-700 transition-all" data-filter="mine" onclick="filterTable('mine', this)">Assigned</button>
                <button class="filter-btn whitespace-nowrap px-5 py-2 text-slate-600 dark:text-slate-400 text-xs font-bold uppercase tracking-wider rounded-lg hover:bg-white/60 dark:hover:bg-slate-700 transition-all" data-filter="completed" onclick="filterTable('completed', this)">Resolved</button>
            </div>
        </div>
    </header>

    <div class="bg-white dark:bg-[#0F172A] border border-slate-200 dark:border-slate-800 rounded-xl md:rounded-2xl shadow-xl overflow-visible flex flex-col">
        <div class="admin-table-container overflow-auto custom-scrollbar">
            <table class="w-full text-left border-separate border-spacing-0 lg:min-w-[1000px]">
                <thead class="hidden lg:table-header-group">
                    <tr class="sticky top-0 z-10 bg-slate-50 dark:bg-slate-800/80 backdrop-blur-md shadow-sm">
                        <th class="p-4 text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 border-b border-slate-200 dark:border-slate-700 rounded-tl-xl">Ref ID</th>
                        <th class="p-4 text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 border-b border-slate-200 dark:border-slate-700">Priority</th>
                        <th class="p-4 text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 border-b border-slate-200 dark:border-slate-700">Client</th>
                        <th class="p-4 text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 border-b border-slate-200 dark:border-slate-700">Issue & Snippet</th>
                        <th class="p-4 text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 border-b border-slate-200 dark:border-slate-700">Agent Details</th>
                        <th class="p-4 text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 border-b border-slate-200 dark:border-slate-700 text-center">Status</th>
                        <th class="p-4 text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 border-b border-slate-200 dark:border-slate-700">Created At</th>
                        <th class="p-4 text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 border-b border-slate-200 dark:border-slate-700 text-right rounded-tr-xl">Actions</th>
                    </tr>
                </thead>
                <tbody id="ticketTableBody" class="divide-y divide-slate-100 dark:divide-slate-800/80"></tbody>
            </table>
        </div>
        <div class="p-5 bg-slate-50 dark:bg-slate-900/50 border-t border-slate-200 dark:border-slate-800 flex flex-col md:flex-row items-center justify-between gap-4 rounded-b-xl md:rounded-b-2xl">
            <span id="pageIndicator" class="text-xs font-bold text-slate-500 uppercase tracking-wider"></span>
            <div class="flex items-center gap-2">
                <button id="prevPage" onclick="changePage(-1)" class="p-2.5 bg-white dark:bg-slate-800 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg border border-slate-200 dark:border-slate-700 disabled:opacity-40 transition-colors shadow-sm"><i class="fas fa-chevron-left text-xs"></i></button>
                <div id="pageNumbers" class="flex gap-1.5"></div>
                <button id="nextPage" onclick="changePage(1)" class="p-2.5 bg-white dark:bg-slate-800 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg border border-slate-200 dark:border-slate-700 disabled:opacity-40 transition-colors shadow-sm"><i class="fas fa-chevron-right text-xs"></i></button>
            </div>
        </div>
    </div>
</div>

<script>
    let allTickets = [];
    let currentPage = 1;
    const itemsPerPage = 10;
    const currentAdminUser = "{{ request.user.username|default:'' }}";
    const currentUserId = "{{ request.user.id|default:'null' }}";

    function scrollToTop() {
        const headElement = document.getElementById('head');
        if (headElement) {
            headElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
        } else {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    async function initAdminSync() {
        try {
            const response = await fetch('/tickets/api/support-api/', { 
                headers: { 'X-Requested-With': 'XMLHttpRequest' } 
            });
            if (!response.ok) {
                console.error("Failed to fetch tickets:", response.status);
                return;
            }
            const data = await response.json();
            allTickets = Array.isArray(data) ? data : (data.results || []); 
            updateUI();
        } catch (err) { console.error("Sync Error:", err); }
    }

    function getPriorityStyles(priority) {
        const p = (priority || '').toLowerCase();
        if (p === 'high') return 'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400 border-red-200 dark:border-red-800/50';
        if (p === 'medium') return 'bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-400 border-amber-200 dark:border-amber-800/50';
        return 'bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400 border-blue-200 dark:border-blue-800/50';
    }

    function getStatusStyles(status) {
        const s = (status || '').toLowerCase();
        if (s === 'resolved' || s === 'closed' || s === 'completed') return 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-400 border-emerald-200 dark:border-emerald-800/50';
        if (s === 'in progress') return 'bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400 border-blue-200 dark:border-blue-800/50';
        if (s === 'pending') return 'bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-400 border-amber-200 dark:border-amber-800/50';
        return 'bg-slate-100 text-slate-700 dark:bg-slate-800 dark:text-slate-400 border-slate-200 dark:border-slate-700';
    }

    function formatTimestamp(dateStr) {
        if (!dateStr) return "N/A";
        const date = new Date(dateStr);
        return date.toLocaleString('en-US', { 
            month: 'short', day: 'numeric', year: 'numeric',
            hour: '2-digit', minute: '2-digit', hour12: true 
        });
    }

    function toggleActionMenu(event, specificMenuId) {
        event.stopPropagation();
        document.querySelectorAll('.action-menu').forEach(menu => {
            if (menu.id !== specificMenuId) menu.style.display = 'none';
        });
        const menu = document.getElementById(specificMenuId);
        if(menu) {
            menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
        }
    }

    document.addEventListener('click', () => {
        document.querySelectorAll('.action-menu').forEach(menu => {
            menu.style.display = 'none';
        });
    });

    function updateUI() {
        const body = document.getElementById('ticketTableBody');
        const searchTerm = document.getElementById('ticketSearch').value.toLowerCase();
        const activeBtn = document.querySelector('.filter-btn.bg-white, .filter-btn.dark\\:bg-blue-600');
        const filterType = activeBtn ? activeBtn.getAttribute('data-filter') : 'all';

        let filtered = allTickets.filter(t => {
            const paddedId = String(t.id).padStart(6, '0');
            const searchableContent = [
                t.id.toString(), paddedId, (t.subject || ""), (t.description || ""), (t.status || ""), 
                (t.priority || ""), (t.user_name || ""), (t.first_name || ""), 
                (t.last_name || ""), (t.technician_name || ""), formatTimestamp(t.created_at).toLowerCase()
            ].join(" ").toLowerCase();

            const matchesSearch = searchableContent.includes(searchTerm);
            let matchesFilter = true;
            if (filterType === 'pending') matchesFilter = (t.status || "").toLowerCase() === 'pending';
            else if (filterType === 'mine') matchesFilter = t.technician_name === currentAdminUser;
            else if (filterType === 'completed') {
                const s = (t.status || "").toLowerCase();
                matchesFilter = (s === 'resolved' || s === 'closed' || s === 'completed');
            }
            return matchesSearch && matchesFilter;
        });

        const mobileCountEl = document.getElementById('mobileCount');
        if(mobileCountEl) mobileCountEl.innerText = String(filtered.length).padStart(2, '0');

        const totalPages = Math.ceil(filtered.length / itemsPerPage) || 1;
        if (currentPage > totalPages) currentPage = totalPages;
        if (currentPage < 1) currentPage = 1;

        const start = (currentPage - 1) * itemsPerPage;
        const paginatedItems = filtered.slice(start, start + itemsPerPage);

        if (paginatedItems.length === 0) {
            body.innerHTML = `<tr><td colspan="8" class="p-24 text-center text-sm font-bold text-slate-400 dark:text-slate-600 flex flex-col items-center gap-3"><i class="fas fa-folder-open text-4xl mb-2 opacity-50"></i> No dispatch records found</td></tr>`;
        } else {
            body.innerHTML = paginatedItems.map(t => `
                <tr class="ticket-row group" onclick="goToDetail(${t.id})">
                    <td class="p-4 lg:w-36 align-middle">
                        <div class="lg:block flex justify-between items-center w-full">
                            <span class="id-badge font-bold text-sm bg-slate-100 text-slate-700 dark:bg-slate-800 dark:text-slate-300 px-2.5 py-1.5 rounded-md border border-slate-200 dark:border-slate-700 shadow-sm">
                                #${String(t.id).padStart(6, '0')}
                            </span>
                            <div class="lg:hidden text-right relative">
                                <button onclick="toggleActionMenu(event, 'menu-mobile-${t.id}')" class="action-btn-trigger h-9 w-9 rounded-full flex items-center justify-center text-slate-400 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700">
                                    <i class="fas fa-ellipsis-v"></i>
                                </button>
                                <div id="menu-mobile-${t.id}" class="action-menu bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl overflow-hidden right-0 mt-2">
                                     <button onclick="quickAction(event, ${t.id}, 'assign')" class="w-full px-5 py-3 text-left text-xs font-bold uppercase tracking-wider hover:bg-slate-50 dark:hover:bg-slate-700/50 flex items-center gap-3 text-slate-700 dark:text-slate-300 transition-colors duration-200">
                                        <i class="fas fa-user-plus text-blue-500 w-4"></i> Assign To Me
                                    </button>
                                    <button onclick="quickAction(event, ${t.id}, 'resolve')" class="w-full px-5 py-3 text-left text-xs font-bold uppercase tracking-wider hover:bg-slate-50 dark:hover:bg-slate-700/50 flex items-center gap-3 text-slate-700 dark:text-slate-300 transition-colors duration-200">
                                        <i class="fas fa-check-circle text-emerald-500 w-4"></i> Mark Resolved
                                    </button>
                                    <div class="border-t border-slate-100 dark:border-slate-700 w-full"></div>
                                    <button onclick="deleteTicket(event, ${t.id})" class="w-full px-5 py-3 text-left text-xs font-bold uppercase tracking-wider text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 flex items-center gap-3 transition-colors duration-200">
                                        <i class="fas fa-trash-alt w-4"></i> Delete Record
                                    </button>
                                </div>
                            </div>
                        </div>
                    </td>
                    <td class="p-4 align-middle">
                        <span class="px-2.5 py-1 rounded-md text-[10px] font-bold uppercase tracking-wider border flex items-center w-fit gap-1.5 ${getPriorityStyles(t.priority)}">
                            <i class="fas fa-circle text-[6px]"></i> ${t.priority || 'Low'}
                        </span>
                    </td>
                    <td class="p-4 align-middle">
                        <div class="flex flex-col">
                            <span class="font-bold text-sm text-slate-800 dark:text-slate-200">${t.first_name || ''} ${t.last_name || ''}</span>
                            <span class="text-xs text-slate-500 dark:text-slate-400 font-medium mt-0.5">@${t.user_name || 'unknown'}</span>
                        </div>
                    </td>
                    <td class="p-4 align-middle lg:max-w-[320px]">
                        <div class="flex flex-col overflow-hidden">
                            <p class="font-bold text-sm text-slate-800 dark:text-slate-200 truncate group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors">${t.subject || 'No Subject'}</p>
                            <p class="text-xs text-slate-500 dark:text-slate-400 truncate mt-1">"${t.description || 'No additional details provided'}"</p>
                        </div>
                    </td>
                    <td class="p-4 align-middle">
                        <div class="flex flex-col gap-1">
                            <span class="text-xs font-bold text-slate-700 dark:text-slate-300 flex items-center gap-2">
                                <i class="fas fa-user-shield text-slate-400"></i> ${t.technician_name || 'Unassigned'}
                            </span>
                            <span class="text-[10px] text-slate-400 dark:text-slate-500 font-semibold">Prev: ${t.previous_technician || 'None'}</span>
                        </div>
                    </td>
                    <td class="p-4 align-middle lg:text-center">
                        <span class="px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase tracking-wider border ${getStatusStyles(t.status)} inline-block">
                            ${t.status || 'Open'}
                        </span>
                    </td>
                    <td class="p-4 align-middle">
                        <div class="flex flex-col">
                            <span class="text-xs font-bold text-slate-700 dark:text-slate-300 whitespace-nowrap">${formatTimestamp(t.created_at)}</span>
                            <span class="text-[10px] text-slate-400 font-semibold uppercase tracking-wider mt-0.5">Logged</span>
                        </div>
                    </td>
                    <td class="p-4 align-middle text-right relative hidden lg:table-cell">
                        <button onclick="toggleActionMenu(event, 'menu-desktop-${t.id}')" class="action-btn-trigger h-9 w-9 rounded-full inline-flex items-center justify-center text-slate-400 hover:text-blue-600 bg-transparent hover:bg-blue-50 dark:hover:bg-blue-900/30">
                            <i class="fas fa-ellipsis-v"></i>
                        </button>
                        <div id="menu-desktop-${t.id}" class="action-menu bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl overflow-hidden mt-2">
                            <button onclick="quickAction(event, ${t.id}, 'assign')" class="w-full px-5 py-3 text-left text-xs font-bold uppercase tracking-wider hover:bg-slate-50 dark:hover:bg-slate-700/50 flex items-center gap-3 text-slate-700 dark:text-slate-300 transition-colors duration-200">
                                <i class="fas fa-user-plus text-blue-500 w-4"></i> Assign To Me
                            </button>
                            <button onclick="quickAction(event, ${t.id}, 'resolve')" class="w-full px-5 py-3 text-left text-xs font-bold uppercase tracking-wider hover:bg-slate-50 dark:hover:bg-slate-700/50 flex items-center gap-3 text-slate-700 dark:text-slate-300 transition-colors duration-200">
                                <i class="fas fa-check-circle text-emerald-500 w-4"></i> Mark Resolved
                            </button>
                            <div class="border-t border-slate-100 dark:border-slate-700 w-full"></div>
                            <button onclick="deleteTicket(event, ${t.id})" class="w-full px-5 py-3 text-left text-xs font-bold uppercase tracking-wider text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 flex items-center gap-3 transition-colors duration-200">
                                <i class="fas fa-trash-alt w-4"></i> Delete Record
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        const showingStart = filtered.length > 0 ? start + 1 : 0;
        const showingEnd = Math.min(start + itemsPerPage, filtered.length);
        document.getElementById('pageIndicator').innerText = `Showing ${showingStart}-${showingEnd} of ${filtered.length} Records`;
        
        document.getElementById('prevPage').disabled = (currentPage <= 1);
        document.getElementById('nextPage').disabled = (currentPage >= totalPages);

        const pageNumbersContainer = document.getElementById('pageNumbers');
        pageNumbersContainer.innerHTML = '';
        
        let startPage = Math.max(1, currentPage - 1);
        let endPage = Math.min(totalPages, startPage + 2);
        if (endPage - startPage < 2) startPage = Math.max(1, endPage - 2);

        for (let i = startPage; i <= endPage; i++) {
            const isCurrent = i === currentPage;
            const btn = document.createElement('button');
            btn.innerText = i;
            btn.className = `px-3.5 py-1.5 text-xs font-bold rounded-lg transition-all border shadow-sm ${
                isCurrent ? 'bg-blue-600 text-white border-blue-600' : 'bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700'
            }`;
            btn.onclick = () => { 
                currentPage = i; 
                updateUI(); 
                scrollToTop(); 
            };
            pageNumbersContainer.appendChild(btn);
        }
    }

    function changePage(dir) { 
        currentPage += dir; 
        updateUI(); 
        scrollToTop(); 
    }

    function goToDetail(id) { window.location.href = `/tickets/detail/${id}/`; }

    async function quickAction(event, id, type) {
        event.stopPropagation();
        
        // Ensure we send the current tech ID for both actions to satisfy backend validation
        const payload = type === 'assign' 
            ? { 
                technician_id: currentUserId, 
                status: 'In Progress', 
                priority: 'Medium' 
              } 
            : { 
                technician_id: currentUserId, // Include who is resolving it
                status: 'Resolved' 
              };
        
        try {
            const res = await fetch(`/tickets/api/support-api/${id}/update_technical_details/`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json', 
                    'X-CSRFToken': '{{ csrf_token }}',
                    'X-Requested-With': 'XMLHttpRequest'
                },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                // Refresh data and close menus
                initAdminSync();
            } else {
                const errorData = await res.json();
                console.error("Server Error:", errorData);
                alert("Failed to update ticket: " + (errorData.detail || "Unknown error"));
            }
        } catch (err) { 
            console.error("Fetch Error:", err); 
        }
    }

    async function deleteTicket(event, id) {
        event.stopPropagation();
        if (!confirm("Are you sure you want to permanently delete this dispatch record?")) return;
        try {
            const res = await fetch(`/tickets/api/support-api/${id}/`, {
                method: 'DELETE',
                headers: { 
                    'X-CSRFToken': '{{ csrf_token }}',
                    'X-Requested-With': 'XMLHttpRequest'
                }
            });
            if (res.ok) initAdminSync();
        } catch (err) { console.error(err); }
    }

    function filterTable(type, btn) {
        document.querySelectorAll('.filter-btn').forEach(b => {
            b.classList.remove('bg-white', 'dark:bg-blue-600', 'text-blue-700', 'dark:text-white', 'shadow');
            b.classList.add('text-slate-600', 'dark:text-slate-400');
        });
        btn.classList.add('bg-white', 'dark:bg-blue-600', 'text-blue-700', 'dark:text-white', 'shadow');
        btn.classList.remove('text-slate-600', 'dark:text-slate-400');
        currentPage = 1;
        updateUI();
    }

    document.getElementById('ticketSearch').addEventListener('input', () => { 
        currentPage = 1; 
        updateUI(); 
    });

    window.addEventListener('DOMContentLoaded', () => { 
        initAdminSync(); 
        setInterval(initAdminSync, 30000); 
    });
</script>
{% endblock %}
