{% extends "core/base.html" %}

{% block content %}
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://www.google.com/recaptcha/api.js" async defer></script>

<div class="min-h-screen flex items-center justify-center bg-slate-50 dark:bg-slate-950 p-4 transition-colors duration-300">
    <div class="w-full max-w-4xl bg-white dark:bg-slate-900 rounded-3xl shadow-2xl border border-slate-200 dark:border-slate-800 flex flex-col md:flex-row overflow-hidden">
        
        <div class="hidden md:flex md:w-1/2 bg-slate-50 dark:bg-slate-800/50 items-center justify-center p-12 border-r border-slate-100 dark:border-slate-800">
            <div class="text-center">
                <div class="w-24 h-24 bg-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-blue-200">
                    <i class="fas fa-shield-alt text-white text-4xl"></i>
                </div>
                <h2 class="text-2xl font-black text-slate-800 dark:text-slate-100 uppercase tracking-tighter">950th CEWW</h2>
                <p class="text-slate-500 dark:text-slate-400 text-xs font-bold uppercase mt-2 tracking-widest">Personnel Recovery System</p>
            </div>
        </div>

        <div class="flex-1 p-8 lg:p-12">
            <div id="step-1" class="space-y-6 animate-in fade-in slide-in-from-right-4 duration-500">
                <div class="mb-8">
                    <h3 class="text-lg font-black text-slate-800 dark:text-slate-100 uppercase">Forgot Password</h3>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Step 1: System Identity Check</p>
                </div>

                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Registered Email</label>
                    <input type="email" id="recovery-email" placeholder="Enter personnel email" 
                           class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-sm outline-none focus:ring-2 focus:ring-blue-500/20 transition-all">
                </div>

                <div class="flex justify-center p-4 bg-slate-50 dark:bg-slate-800/50 rounded-2xl border border-slate-200 dark:border-slate-700">
                    <div class="g-recaptcha" id="recaptcha-widget" data-sitekey="6LfZKoksAAAAAIQa-R-ifpRM-KAWlH6GURcjcT5D" data-theme="dark"></div>
                </div>

                <div class="flex items-center justify-center gap-3 py-3 border-y border-slate-100 dark:border-slate-800">
                    <span id="step1-num1" class="font-black text-blue-600"></span>
                    <span class="text-slate-400">+</span>
                    <span id="step1-num2" class="font-black text-blue-600"></span>
                    <span class="text-slate-400">=</span>
                    <input type="number" id="step1-captcha-ans" placeholder="?" required 
                           class="w-16 py-1 text-center border-b-2 border-blue-500 bg-transparent font-bold outline-none text-slate-800 dark:text-white transition-colors">
                </div>

                <div class="flex gap-3">
                    <button id="send-otp-btn" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-black py-3 rounded-xl text-[10px] uppercase tracking-widest transition-all shadow-lg shadow-blue-500/20">Send OTP</button>
                    <a href="{% url 'login' %}" class="px-6 py-3 border border-slate-200 dark:border-slate-700 text-slate-400 font-black rounded-xl text-[10px] uppercase tracking-widest hover:bg-slate-50 dark:hover:bg-slate-800 transition-all">Cancel</a>
                </div>
            </div>

            <form id="step-2-form" class="hidden space-y-5 animate-in fade-in slide-in-from-bottom-4 duration-500">
                {% csrf_token %}
                
                <input type="hidden" name="email" id="step2-email-input">
                
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[10px] font-black text-emerald-500 uppercase tracking-widest">Verification Required</span>
                    <span id="timer" class="text-[10px] font-black text-slate-400 bg-slate-100 dark:bg-slate-800 px-2 py-1 rounded">300s remaining</span>
                </div>
                
                <input type="text" name="otp" placeholder="6-Digit OTP" required 
                       class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-center font-mono text-lg tracking-[0.5em] outline-none focus:border-blue-500">
                
                <input type="password" name="new_password" placeholder="New Password" required 
                       class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-sm outline-none focus:ring-2 focus:ring-blue-500/20">
                
                <input type="password" name="confirm_password" placeholder="Confirm Password" required 
                       class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-sm outline-none focus:ring-2 focus:ring-blue-500/20">

                <div class="flex items-center justify-center gap-3 py-3 border-y border-slate-100 dark:border-slate-800">
                    <span id="num3" class="font-black text-blue-600"></span>
                    <span class="text-slate-400">+</span>
                    <span id="num4" class="font-black text-blue-600"></span>
                    <span class="text-slate-400">=</span>
                    <input type="number" name="step2_captcha_ans" required class="w-16 py-1 text-center border-b-2 border-blue-500 bg-transparent font-bold outline-none text-slate-800 dark:text-white transition-colors">
                </div>

                <button type="submit" id="reset-confirm-btn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-4 rounded-xl text-[10px] uppercase tracking-widest transition-all shadow-lg shadow-emerald-500/20">Confirm Reset</button>
            </form>
        </div>
    </div>
</div>

<script>
$(document).ready(function() {
    let step1Answer = 0;

    // --- Generate Math Captcha for Step 1 ---
    function refreshStep1Captcha() {
        const n1 = Math.floor(Math.random() * 10) + 1;
        const n2 = Math.floor(Math.random() * 10) + 1;
        step1Answer = n1 + n2;
        $('#step1-num1').text(n1);
        $('#step1-num2').text(n2);
        
        // Clear input and reset styling back to default blue
        $('#step1-captcha-ans').val('')
            .removeClass('border-emerald-500 text-emerald-600 dark:text-emerald-400 border-red-500 text-red-600 dark:text-red-400')
            .addClass('border-blue-500 text-slate-800 dark:text-white');
    }

    refreshStep1Captcha(); // Initialize on load

    // --- REAL-TIME CAPTCHA VALIDATION VISUALS ---
    // Step 1 Validation
    $('#step1-captcha-ans').on('input', function() {
        const val = parseInt($(this).val());
        const isEmpty = isNaN(val);
        const isCorrect = val === step1Answer;
        
        // Remove all color states
        $(this).removeClass('border-blue-500 text-slate-800 dark:text-white border-emerald-500 text-emerald-600 dark:text-emerald-400 border-red-500 text-red-600 dark:text-red-400');
        
        // Apply new color state
        if (isEmpty) {
            $(this).addClass('border-blue-500 text-slate-800 dark:text-white');
        } else if (isCorrect) {
            $(this).addClass('border-emerald-500 text-emerald-600 dark:text-emerald-400');
        } else {
            $(this).addClass('border-red-500 text-red-600 dark:text-red-400');
        }
    });

    // Step 2 Validation
    $('input[name="step2_captcha_ans"]').on('input', function() {
        const val = parseInt($(this).val());
        const expectedAns = parseInt($('#num3').text()) + parseInt($('#num4').text());
        const isEmpty = isNaN(val);
        const isCorrect = val === expectedAns;
        
        // Remove all color states
        $(this).removeClass('border-blue-500 text-slate-800 dark:text-white border-emerald-500 text-emerald-600 dark:text-emerald-400 border-red-500 text-red-600 dark:text-red-400');
        
        // Apply new color state
        if (isEmpty) {
            $(this).addClass('border-blue-500 text-slate-800 dark:text-white');
        } else if (isCorrect) {
            $(this).addClass('border-emerald-500 text-emerald-600 dark:text-emerald-400');
        } else {
            $(this).addClass('border-red-500 text-red-600 dark:text-red-400');
        }
    });


    // --- 1. JQUERY AJAX: STEP 1 (Send OTP) ---
    $('#send-otp-btn').on('click', function() {
        const email = $('#recovery-email').val();
        const userAnswer = parseInt($('#step1-captcha-ans').val());
        const $btn = $(this);
        
        let recaptchaResponse = '';
        try {
            recaptchaResponse = grecaptcha.getResponse();
        } catch (e) {
            console.warn("reCAPTCHA check failed.");
        }

        // Basic Validations
        if (!email) { alert("Personnel email is required."); return; }
        if (!recaptchaResponse) { alert("Please complete the reCAPTCHA."); return; }
        if (userAnswer !== step1Answer) { 
            alert("Security Check: Incorrect math answer."); 
            refreshStep1Captcha();
            return; 
        }

        $btn.prop('disabled', true).html('<i class="fas fa-circle-notch fa-spin mr-2"></i> PROCESSING...');

        $.ajax({
            url: "/api/forgot-password/", 
            type: 'POST',
            data: {
                'action': 'send_otp',
                'email': email,
                'g-recaptcha-response': recaptchaResponse,
                'step1_captcha_ans': userAnswer, 
                // Fix: Grab the CSRF token directly from the DOM to avoid syntax conflicts
                'csrfmiddlewaretoken': $('[name=csrfmiddlewaretoken]').val()
            },
            headers: { 'X-Requested-With': 'XMLHttpRequest' },
            success: function(data) {
                if (data.status === 'success') {
                    // Fix: Inject the email into the Step 2 form so the backend knows whose password to reset
                    $('#step2-email-input').val(email);

                    $('#num3').text(data.num3);
                    $('#num4').text(data.num4);
                    $('#step-1').addClass('hidden');
                    $('#step-2-form').removeClass('hidden');
                    startTimer(300);
                } else {
                    alert(data.message);
                    $btn.prop('disabled', false).text("Send OTP");
                    refreshStep1Captcha();
                    if (typeof grecaptcha !== 'undefined') grecaptcha.reset();
                }
            },
            error: function() {
                alert("Protocol Error: Connection lost.");
                $btn.prop('disabled', false).text("Send OTP");
            }
        });
    });

    // --- 2. JQUERY AJAX: STEP 2 (Reset Action) ---
    $('#step-2-form').on('submit', function(e) {
        e.preventDefault();
        const $btn = $('#reset-confirm-btn');
        // The hidden email field is now automatically included in .serialize()
        const formData = $(this).serialize() + '&action=reset_password';

        $btn.prop('disabled', true).text("SYNCING CREDENTIALS...");

        $.ajax({
            url: "/api/forgot-password/", 
            type: 'POST',
            data: formData,
            success: function(data) {
                if(data.status === 'success') {
                    alert("Personnel Credentials Updated successfully.");
                    window.location.href = "{% url 'login' %}";
                } else {
                    alert(data.message);
                    $btn.prop('disabled', false).text("Confirm Reset");
                }
            },
            error: function() {
                alert("Server Error: Unable to process request.");
                $btn.prop('disabled', false).text("Confirm Reset");
            }
        });
    });
});

function startTimer(duration) {
    let timer = duration;
    const display = document.getElementById('timer');
    const interval = setInterval(() => {
        let minutes = parseInt(timer / 60, 10);
        let seconds = parseInt(timer % 60, 10);
        seconds = seconds < 10 ? "0" + seconds : seconds;
        display.innerText = `${minutes}:${seconds} remaining`;
        if (--timer < 0) {
            display.innerText = "OTP Expired";
            display.classList.add('text-red-500');
            clearInterval(interval);
        }
    }, 1000);
}
</script>
{% endblock %}
